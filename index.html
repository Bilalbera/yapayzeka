<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BilalAI - Yerel Yapay Zeka</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat-box { width: 80%; height: 400px; border: 1px solid #444; overflow-y: auto; padding: 10px; margin-bottom: 10px; background: #1e1e1e; border-radius: 8px; }
        #status { color: #00ff00; font-size: 0.9em; margin-bottom: 10px; }
        input { width: 70%; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #2563eb; color: white; border: none; border-radius: 5px; margin-left: 5px; }
    </style>
</head>
<body>

    <h1>BilalAI - %100 Yerel</h1>
    <div id="status">Yükleniyor... (Lütfen WebGPU destekli bir tarayıcı kullan: Chrome/Edge)</div>
    <div id="chat-box"></div>
    
    <div style="width: 80%; display: flex;">
        <input type="text" id="user-input" placeholder="Bir şey sor...">
        <button id="send-btn">Gönder</button>
    </div>

    <script type="module">
        import * as webllm from "https://esm.run/@mlc-ai/web-llm";

        const chatBox = document.getElementById("chat-box");
        const status = document.getElementById("status");
        const input = document.getElementById("user-input");
        const btn = document.getElementById("send-btn");

        // Kullanacağımız model (Llama-3-8B'nin çok küçük ve hızlı bir versiyonu)
        const selectedModel = "Llama-3-8B-Instruct-q4f32_1-MLC";

        const engine = await webllm.CreateMLCEngine(selectedModel, {
            initProgressCallback: (report) => {
                status.innerText = report.text; // Yükleme aşamasını gösterir
            }
        });

        async function askAI() {
            const text = input.value;
            if (!text) return;

            chatBox.innerHTML += `<div><b>Sen:</b> ${text}</div>`;
            input.value = "";

            const messages = [{ role: "user", content: text }];
            
            let aiResponse = "";
            const reply = await engine.chat.completions.create({ messages });
            aiResponse = reply.choices[0].message.content;

            chatBox.innerHTML += `<div><b>BilalAI:</b> ${aiResponse}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        btn.onclick = askAI;
    </script>
</body>
</html>
